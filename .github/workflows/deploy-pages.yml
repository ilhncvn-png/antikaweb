name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; in-progress runs are not cancelled.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # API routes are not compatible with static export.
      # The contact form falls back to a WhatsApp redirect in static mode.
      - name: Remove API routes for static build
        run: rm -rf src/app/api

      - name: Build static export
        run: npm run build
        env:
          DEPLOY_TARGET: static
          # Sets the sub-path for GitHub Pages (e.g. /antikaweb).
          # If you have a custom domain configured in GitHub Pages settings,
          # change both BASE_PATH and NEXT_PUBLIC_BASE_PATH to empty strings.
          BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_DEPLOY_TARGET: static
          # Add these as Repository Secrets in Settings → Secrets and variables → Actions
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_GOOGLE_ADS_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_ADS_ID }}

      # Prevents GitHub Pages from running Jekyll, which ignores _next/ directories.
      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
